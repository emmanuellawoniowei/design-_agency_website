<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <title>Design Agency</title>
</head>

<body class="font-[Figtree]">
    <div class=" w-full">
        <header class="m-[30px] md:mx-[60px] xl:mx-[135px]">
            <div class="flex flex-row items-center justify-between">
                <img src="./assets/icons/brand logo.png" alt="Brand logo" class="w-[70px] h-[70px]">
                <img src="./assets/icons/Vector.svg" alt="Hamburger Icon" class="h-[24px] w-[30px] md:h-[30px]">
            </div>
        </header>

        <!-- Hero section -->
            <div
                class="bg-[#E9F4FF] h-[493px] md:h-[335px] lg:h-[500px] xl:h-[580px] px-[20px] md:px-0 flex flex-col md:flex-row xl:flex-row items-center justify-center md:justify-between md:px-[65px] lg:justify-between lg:px-[65px] xl:justify-around xl:px-[100px] gap-[15px] xl:gap-[30px] relative">

                <!-- Hero text -->
                <div class="flex flex-col items-center justify-center md:items-start xl:items-start gap-[20px] mt-[55px] md:m-0 lg:m-0 xl:m-0">

                    <h2 class="font-bold text-[23px] md:text-[29px]/11 lg:text-[40px]/13 xl:text-[50px]/17 text-center md:text-left text-[#1A2630] md:max-w-[340px] lg:max-w-[490px] xl:max-w-[610px]"> Crafting 
                        <span class="relative text-[#1A2630]"> Visual
                            <img src="./assets/icons/Vector 3.svg" class="absolute left-0 bottom-0 w-[350px] h-[5px]">
                        </span>
                        Stories:
                        <br>
                        Unleashing Creative Essence
                    </h2>

                    <button
                        class="bg-[#4361EE] cursor-pointer w-[167px] h-[64px] text-[20px] text-white font-bold flex flex-row justify-center items-center gap-2 rounded-[8px]">
                        Let's talk
                        <img src="./assets/icons/Right arrow icon 1.svg" class="w-5 h-5">
                    </button>

                </div>

                <!-- Hero image -->
                <div class="relative flex items-center justify-center mt-[10px] md:mt-0 lg:mt-0 xl:mt-0">

                    <img src="./assets/images/woman-looking-color-palettes-medium-shot 1.png"
                        class="relative z-1000 w-[290px] h-[295px] md:w-[305px] md:h-[310px] lg:w-[420px] lg:h-[425px] xl:w-[515px] xl:h-[530px] top-[18px] md:top-[45px] lg:top-[55px] xl:top-[48px] xl:left-[7px]"
                    >

                    <img src="./assets/icons/Rows cont 1-1.svg"
                        class="absolute left-[-12px] top-0 md:top-[15px] lg:top-0 xl:top-[20px] w-[85px] h-[85px] md:w-[90px] md:h-[90px] lg:w-[120px] lg:h-[120px] xl:w-[140px] xl:h-[140px] z-0"
                    >
                </div>

            </div>

    </div>


</body>

</html>
